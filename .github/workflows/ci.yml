name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -project TokenMonitor.xcodeproj \
            -scheme TokenMonitor \
            -configuration Debug \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test packages
        run: |
          swift test --package-path Packages/TokenMonitorCore
          swift test --package-path Packages/TokenMonitorProviders
          swift test --package-path Packages/TokenMonitorUI
