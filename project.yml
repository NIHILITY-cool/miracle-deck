name: MiracleDeck

options:
  bundleIdPrefix: cool.nihility.miracledeck
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"

packages:
  MiracleDeckCore:
    path: Packages/MiracleDeckCore
  MiracleDeckProviders:
    path: Packages/MiracleDeckProviders
  MiracleDeckUI:
    path: Packages/MiracleDeckUI

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES

targets:
  MiracleDeck:
    type: application
    platform: macOS
    sources:
      - path: App
    resources:
      - path: Resources
    dependencies:
      - package: MiracleDeckProviders
        product: MiracleDeckProviders
      - package: MiracleDeckUI
        product: MiracleDeckUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cool.nihility.miracledeck
        PRODUCT_NAME: MiracleDeck
        MARKETING_VERSION: 0.0.1
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: MiracleDeck
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
    entitlements:
      path: App/MiracleDeck.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

schemes:
  MiracleDeck:
    build:
      targets:
        MiracleDeck: all
    run:
      config: Debug
    archive:
      config: Release
